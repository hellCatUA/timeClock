# Nginx reverse proxy config for TimeClock
# Place in /etc/nginx/sites-available/timeclock and symlink to sites-enabled

server {
    listen 80;
    server_name timeclock.local;  # change to your hostname or Tailscale DNS name

    # Compress text assets
    gzip on;
    gzip_types text/css application/javascript application/json;

    # Cache static assets
    location ~* \.(css|js|png|ico|svg)$ {
        proxy_pass http://127.0.0.1:3000;
        expires 1d;
        add_header Cache-Control "public";
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 30s;
    }
}
