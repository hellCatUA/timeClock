services:
  timeclock:
    build:
      context: /docker/apps/timeClock
      dockerfile: Dockerfile
    container_name: timeclock
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:3000"
    environment:
      TZ: America/Los_Angeles
      PORT: "3000"
      DB_PATH: /data/timeclock.db
      UPLOADS_DIR: /data/uploads
    volumes:
      - /docker/apps/timeClock/data:/data
